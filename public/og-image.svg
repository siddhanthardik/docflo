<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030C1E" />
      <stop offset="50%" stop-color="#020B1A" />
      <stop offset="100%" stop-color="#000713" />
    </linearGradient>

    <!-- Accent Glow -->
    <radialGradient id="glow" cx="60%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#0066FF" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>

    <!-- X Gradient -->
    <linearGradient id="og-x-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0066FF" />
      <stop offset="100%" stop-color="#00D2FF" />
    </linearGradient>

    <!-- Card Border Gradient -->
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="50%" stop-color="#334155" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-grad)" />
  <circle cx="700" cy="250" r="450" fill="url(#glow)" />

  <!-- Outer Frame -->
  <rect x="40" y="40" width="1120" height="550" rx="32" stroke="url(#border-grad)" stroke-width="2" fill="none" />

  <!-- Main Content Group -->
  <g transform="translate(180, 210)">
    <!-- Gyrex Wordmark -->
    <g fill="#FFFFFF" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="800" font-size="120" letter-spacing="-5">
      <text x="0" y="110">gyre</text>
    </g>

    <!-- Stylized Icon X -->
    <g transform="translate(415, 12)">
      <!-- Left diagonal stroke of X -->
      <path d="M18 10L82 106" stroke="url(#og-x-grad)" stroke-width="24" stroke-linecap="round"/>
      <!-- Right chevron stroke of X -->
      <path d="M82 10L40 58L82 106" stroke="url(#og-x-grad)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Subtitle / Tagline -->
    <text x="5" y="190" fill="#94A3B8" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="600" font-size="28" letter-spacing="0.5">
      Healthcare Local SEO &amp; Patient Intelligence Platform
    </text>

    <!-- Badge -->
    <g transform="translate(5, 230)">
      <rect width="140" height="36" rx="18" fill="#0F172A" stroke="#1E293B" stroke-width="1"/>
      <circle cx="20" cy="18" r="4" fill="#00D2FF"/>
      <text x="32" y="23" fill="#E2E8F0" font-family="system-ui, sans-serif" font-weight="600" font-size="14" letter-spacing="0.5">gyrex.in</text>
    </g>
  </g>
</svg>
